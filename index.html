<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate DJ Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="management-card">
        <h3><i class="ph-fill ph-music-notes-simple"></i> Your Library</h3>
        
        <div id="drop-zone">
            <i class="ph-duotone ph-folder-open drop-icon"></i>
            <br>Drop MP3s here or click to add
            <input type="file" id="file-input" multiple accept="audio/*">
        </div>

        <div class="playlist-section">
            <ul id="playlist">
                </ul>
        </div>
    </div>

    <div class="music-player">
        <div class="player-header">
            <button id="record-btn" title="Record your DJ set">
                <i class="ph-fill ph-record"></i> Record Mix
            </button>
            <button id="theme-btn" title="Switch Theme">
                <i class="ph-fill ph-palette"></i> Theme
            </button>
        </div>

        <div class="cover-wrapper" id="cover-wrapper">
            <img id="cover" src="" alt="Album Art">
        </div>

        <div class="song-info">
            <h2 id="song-title">Song Title</h2>
            <p id="song-artist">Artist Name</p>
        </div>

        <div class="lyrics-container">
            <p id="current-lyric"><i class="ph-duotone ph-music-notes"></i></p>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="progress-wrapper">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="total-duration">0:00</span>
        </div>

        <div class="controls">
            <button id="shuffle-btn" title="Shuffle"><i class="ph-bold ph-shuffle"></i></button>
            <button id="prev-btn" title="Previous (Left Arrow)"><i class="ph-fill ph-skip-back"></i></button>
            <button id="play-btn" title="Play/Pause (Space)"><i class="ph-fill ph-play-circle"></i></button>
            <button id="next-btn" title="Next (Right Arrow)"><i class="ph-fill ph-skip-forward"></i></button>
            <button id="repeat-btn" title="Repeat"><i class="ph-bold ph-repeat"></i></button>
        </div>

        <div class="audio-controls">
            <div class="slider-group">
                <i class="ph-fill ph-speaker-low vol-icon"></i>
                <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="1">
                <i class="ph-fill ph-speaker-high vol-icon"></i>
            </div>
        </div>
    </div>

    <div class="dj-card">
        <h3><i class="ph-fill ph-sliders-horizontal"></i> DJ Mixer</h3>
        
        <div class="dj-section">
            <div class="dj-header-row">
                <h4>Hot Cues</h4>
            </div>
            <div class="loop-controls">
                <button id="cue-1" class="dj-btn loop-btn">Set 1</button>
                <button id="cue-2" class="dj-btn loop-btn">Set 2</button>
                <button id="cue-3" class="dj-btn loop-btn">Set 3</button>
            </div>
            <button id="clear-cues-btn" class="dj-btn">Clear Cues</button>
        </div>

        <div class="dj-section">
            <h4>3-Band EQ</h4>
            <div class="slider-group">
                <span class="eq-label">High</span>
                <input type="range" id="eq-high" min="-15" max="15" step="1" value="0">
            </div>
            <div class="slider-group">
                <span class="eq-label">Mid</span>
                <input type="range" id="eq-mid" min="-15" max="15" step="1" value="0">
            </div>
            <div class="slider-group">
                <span class="eq-label">Low</span>
                <input type="range" id="eq-low" min="-15" max="15" step="1" value="0">
            </div>
        </div>

        <div class="dj-section">
            <div class="dj-header-row">
                <h4>Filter Sweep</h4>
                <span id="filter-label" class="dj-value">OFF</span>
            </div>
            <div class="slider-group">
                <span title="Low-Pass (Muffled)">LPF</span>
                <input type="range" id="filter-bar" min="-100" max="100" step="1" value="0">
                <span title="High-Pass (Thin)">HPF</span>
            </div>
            <button id="reset-filter-btn" class="dj-btn">Reset Filter</button>
        </div>

        <div class="dj-section">
            <div class="dj-header-row">
                <h4>Space FX</h4>
                <span id="fx-label" class="dj-value">DRY</span>
            </div>
            <div class="slider-group">
                <span class="eq-label">Echo</span>
                <input type="range" id="echo-amount" min="0" max="0.8" step="0.05" value="0">
            </div>
            <div class="slider-group">
                <span class="eq-label">Reverb</span>
                <input type="range" id="reverb-amount" min="0" max="1" step="0.05" value="0">
            </div>
        </div>

        <div class="dj-section">
            <div class="dj-header-row">
                <h4>Tempo</h4>
                <span id="tempo-label" class="dj-value">1.00x</span>
            </div>
            <div class="slider-group">
                <i class="ph-fill ph-tortoise tempo-icon"></i>
                <input type="range" id="tempo-bar" min="0.5" max="1.5" step="0.01" value="1">
                <i class="ph-fill ph-rabbit tempo-icon"></i>
            </div>
            <button id="reset-tempo-btn" class="dj-btn">Reset Tempo</button>
        </div>

        <div class="dj-section">
            <div class="dj-header-row">
                <h4>Panning</h4>
                <span id="pan-label" class="dj-value">Center</span>
            </div>
            <div class="slider-group">
                <span>L</span>
                <input type="range" id="pan-bar" min="-1" max="1" step="0.05" value="0">
                <span>R</span>
            </div>
        </div>

        <div class="dj-section">
            <div class="dj-header-row">
                <h4>A/B Looper</h4>
                <span id="loop-label" class="dj-value">OFF</span>
            </div>
            <div class="loop-controls">
                <button id="loop-a-btn" class="dj-btn loop-btn">Set A</button>
                <button id="loop-b-btn" class="dj-btn loop-btn">Set B</button>
            </div>
            <button id="clear-loop-btn" class="dj-btn">Clear Loop</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
