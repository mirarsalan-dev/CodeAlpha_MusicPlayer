<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Music Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <div class="management-card">
        <h3>🎵 Your Library</h3>
        
        <div id="drop-zone">
            Drop MP3s here or click to add
            <input type="file" id="file-input" multiple accept="audio/*">
        </div>

        <div class="playlist-section">
            <ul id="playlist">
                </ul>
        </div>
    </div>

    <div class="music-player">
        <div class="player-header">
            <button id="theme-btn" title="Switch Theme">🎨 Switch Theme</button>
        </div>

        <div class="cover-wrapper" id="cover-wrapper">
            <img id="cover" src="" alt="Album Art">
        </div>

        <div class="song-info">
            <h2 id="song-title">Song Title</h2>
            <p id="song-artist">Artist Name</p>
        </div>

        <div class="lyrics-container">
            <p id="current-lyric">🎵</p>
        </div>

        <canvas id="visualizer"></canvas>

        <div class="progress-wrapper">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="total-duration">0:00</span>
        </div>

        <div class="controls">
            <button id="shuffle-btn" title="Shuffle">🔀</button>
            <button id="prev-btn" title="Previous (Left Arrow)">⏮</button>
            <button id="play-btn" title="Play/Pause (Space)">▶️</button>
            <button id="next-btn" title="Next (Right Arrow)">⏭</button>
            <button id="repeat-btn" title="Repeat">🔁</button>
        </div>

        <div class="audio-controls">
            <div class="slider-group">
                <span>🔈</span>
                <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="1">
                <span>🔊</span>
            </div>
            <div class="slider-group">
                <span class="eq-label">Bass</span>
                <input type="range" id="bass-bar" min="-15" max="15" step="1" value="0">
            </div>
            <div class="slider-group">
                <span class="eq-label">Treble</span>
                <input type="range" id="treble-bar" min="-15" max="15" step="1" value="0">
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
